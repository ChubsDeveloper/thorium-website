; Thorium WoW PHP Security Settings

; Hide PHP version
expose_php = Off

; Disable dangerous functions
disable_functions = exec,passthru,shell_exec,system,proc_open,popen,curl_exec,curl_multi_exec,parse_ini_file,show_source,file_get_contents

; File upload security
file_uploads = On
upload_max_filesize = 10M
max_file_uploads = 5
upload_tmp_dir = /tmp

; Session security
session.cookie_secure = 1
session.cookie_httponly = 1
session.cookie_samesite = Strict
session.use_strict_mode = 1
session.sid_length = 64
session.sid_bits_per_character = 6

; Error handling
display_errors = Off
display_startup_errors = Off
log_errors = On
error_log = /var/log/php_errors.log

; Resource limits
max_execution_time = 30
max_input_time = 30
memory_limit = 128M
post_max_size = 20M

; Prevent path disclosure
cgi.fix_pathinfo = 0
